.basketball-container {

.basketball-gallery {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
}
.basketball-gallery img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 6px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);

}
.basketball-gallery img:hover {

}

}
.modal-content {

#modalImg {

.close-btn {

    font-size: 32px;
    font-weight: bold;
    position: absolute;
    right: 0;
    top: -30px;
    cursor: pointer;

.modal-desc {

<div id="imageModal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    < img id="modalImg" src="" alt="放大图片">
    <div id="modalDescription" class="modal-desc"></div>
  </div>
</div>

<script>
function openModal(imgElement) {
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("modalImg");
    const modalDesc = document.getElementById("modalDescription");

    modal.style.display = "flex";
    modalImg.src = imgElement.src;

    const productTitle = imgElement.alt;
    // 修改为篮球适配文案
    modalDesc.innerText = productTitle + " \n\n Professional match & training basketball. Crafted with premium composite leather, excellent air retention, stable grip and consistent bounce for indoor and outdoor courts. Custom OEM/ODM printing available.";
}

function closeModal() {
    document.getElementById("imageModal").style.display = "none";
}
</script>
