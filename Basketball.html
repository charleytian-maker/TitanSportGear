<style type="text/css">
/* 25张图片的外层大盒子 */
.basketball-container {
    background-color: #1a1a1a;  /* 保持门楣以下依然是高档的深黑色 */
    padding: 60px 20px;         /* 上下左右留出舒服的间距 */
}

.basketball-gallery {
    max-width: 1200px;          /* 限制最大宽度，防止在大屏幕上图片太散 */
    margin: 0 auto;             /* 居中显示 */
    display: grid;              /* 启用现代网格排版 */
    grid-template-columns: repeat(5, 1fr); /* 核心：每行精准排列 5 张图片 */
    gap: 20px;                  /* 图片与图片之间的间隙 */
}

/* 每一张图片的样式 */
.basketball-gallery img {
    width: 100%;                /* 宽度自动撑满网格 */
    height: 220px;              /* 固定高度，确保每张图大小完全一致 */
    object-fit: cover;          /* 图片自动裁剪填充，不会变形拉伸 */
    border-radius: 6px;         /* 微微的圆角，更美观 */
    box-shadow: 0 4px 10px rgba(0,0,0,0.5); /* 给图片加一点立体阴影 */
    transition: transform 0.3s; /* 鼠标放上去时加上平滑动画 */
}

/* 鼠标放到图片上时的微动特效 */
.basketball-gallery img:hover {
    transform: translateY(-5px); /* 图片微微往上浮起 */
}
</style>
