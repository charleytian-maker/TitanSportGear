<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>contact us</title>
    <style>
        /* 针对下拉框环境进行的特殊样式优化 */
        body {
            margin: 0;
            padding: 30px 40px; /* 四周留出精美的边距 */
            background-color: #ffffff; /* 确保背景是纯白 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 使用三列网格排版，让电话、邮箱、地址横向并排 */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .contact-box {
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .icon {
            font-size: 26px;
            line-height: 1;
        }

        .details h4 {
            margin: 0 0 8px 0;
            color: #1a1f2c;
            font-size: 16px;
            font-weight: 600;
        }

        .details p {
            margin: 0;
            color: #606f7b;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <!-- 1. 首页门楣区域 (保留里面所有内容) -->
<header id="header-container">
    <!-- 这里存放你从首页复制过来的门楣内容，如 Logo、导航栏等 -->
    <!-- 注意：图片左侧有一个 load-header.js，如果你是用 JS 动态加载门楣，请确保保留该脚本 -->
</header>

<!-- 2. 联系方式区域 (完全独立并移到下方) -->
<main class="contact-main">
    <div class="contact-grid">
        <!-- 你的联系方式内容 (电话、邮箱、地址等) -->
        <div class="contact-box">...</div>
        <div class="contact-box">...</div>
    </div>
</main>

    <!-- 核心联系方式内容 -->
    <div class="contact-grid">
        
        <!-- 电话区 -->
        <div class="contact-box">
            <div class="icon">📞</div>
            <div class="details">
                <h4>Telephone</h4>
                <p>+86 131-8282-2839</p >
                <p style="color: #a0aec0; font-size: 12px; margin-top: 4px;">Mon-Sat 8:00 - 18:00</p >
            </div>
        </div>

        <!-- 邮箱区 -->
        <div class="contact-box">
            <div class="icon">✉️</div>
            <div class="details">
                <h4>E-mail</h4>
                <p>charleytian@gmail.com</p >
                <p style="color: #a0aec0; font-size: 12px; margin-top: 4px;">Usually reply within 24 hours</p >
            </div>
        </div>

        <!-- 地址区 -->
        <div class="contact-box">
            <div class="icon">📍</div>
            <div class="details">
                <h4>Address</h4>
                <p>Room102 #1 building #66 Yangxin Rd,Liuhe District Nanjing Jiangsu Province China </p >
            </div>
        </div>

    </div>

</body>
</html>
