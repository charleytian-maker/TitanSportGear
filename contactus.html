<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>联系我们</title>
    <style>
        /* 针对下拉框环境进行的特殊样式优化 */
        body {
            margin: 0;
            padding: 30px 40px; /* 四周留出精美的边距 */
            background-color: #ffffff; /* 确保背景是纯白 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 使用三列网格排版，让电话、邮箱、地址横向并排 */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .contact-box {
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .icon {
            font-size: 26px;
            line-height: 1;
        }

        .details h4 {
            margin: 0 0 8px 0;
            color: #1a1f2c;
            font-size: 16px;
            font-weight: 600;
        }

        .details p {
            margin: 0;
            color: #606f7b;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <!-- 核心联系方式内容 -->
    <div class="contact-grid">
        
        <!-- 电话区 -->
        <div class="contact-box">
            <div class="icon">📞</div>
            <div class="details">
                <h4>电话咨询</h4>
                <p>+86 123-4567-8901</p >
                <p style="color: #a0aec0; font-size: 12px; margin-top: 4px;">周一至周五 9:00 - 18:00</p >
            </div>
        </div>

        <!-- 邮箱区 -->
        <div class="contact-box">
            <div class="icon">✉️</div>
            <div class="details">
                <h4>电子邮箱</h4>
                <p>support@yourdomain.com</p >
                <p style="color: #a0aec0; font-size: 12px; margin-top: 4px;">通常在24小时内回复</p >
            </div>
        </div>

        <!-- 地址区 -->
        <div class="contact-box">
            <div class="icon">📍</div>
            <div class="details">
                <h4>公司地址</h4>
                <p>北京市朝阳区高新技术园区A座 101 室</p >
            </div>
        </div>

    </div>

</body>
</html>
