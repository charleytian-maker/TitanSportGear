<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Contact Us - TitanSportGear</title>
<meta name="description" content="Contact TitanSportGear - professional manufacturer & exporter of sporting goods." />
<link href="http://fonts.googleapis.com/css?family=Open+Sans:300,600,700" rel="stylesheet" />
<link href="default.css" rel="stylesheet" type="text/css" media="all" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
  /* 导航下拉菜单（与首页保持一致，header.html 注入后生效） */
  #menu ul li { position: relative !important; }
  .my-dropdown-menu {
    display: none;
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    background-color: #28a8a8;
    min-width: 160px;
    box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
    padding: 5px 0;
    z-index: 9999;
    border-radius: 4px;
    max-height: 350px;
    overflow-y: auto;
  }
  .my-dropdown-menu a {
    display: block !important;
    color: #ffffff !important;
    padding: 10px 15px !important;
    font-size: 12px !important;
    text-transform: none !important;
    font-weight: normal !important;
    text-align: center !important;
    text-decoration: none !important;
    border-bottom: 1px solid #eee;
    background: none !important;
  }
  .my-dropdown-menu a:last-child { border-bottom: none; }
  .my-dropdown-menu a:hover {
    background-color: #1f8c8c !important;
    color: #000000 !important;
  }
  .dropdown-item:hover .my-dropdown-menu { display: block !important; }
  #header-wrapper, #header, #menu, .dropdown-item { overflow: visible !important; }
  #header-wrapper { position: relative; z-index: 99999; }

  /* 联系方式页面内容样式 */
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .contact-main {
    min-height: calc(100vh - 200px); /* 200px 为门楣+footer 预留高度，可按实际调整 */
    padding: 120px 40px;
    background-color: #000000;
    display: flex;
    flex-direction: column; /* 垂直排布：地图在上，联系信息在下 */
    align-items: center;
    justify-content: flex-start; /* 取消垂直居中，内容靠顶部 */
  }
  /* 谷歌地图容器 */
  .map-wrapper {
    width: 100%;
    max-width: 1200px;
    margin-bottom: 50px; /* 地图和下方联系方式的垂直距离 */
  }
  .contact-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 30px;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
  }
  .contact-box {
    display: flex;
    align-items: flex-start;
    gap: 15px;
  }
  .icon { font-size: 26px; line-height: 1; }
  .details h4 {
    margin: 0 0 8px 0;
    color: #606f7b;
    font-size: 18px;
    font-weight: 600;
  }
  .details p {
    margin: 0;
    color: #606f7b;
    font-size: 18px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<!-- 门楣由 load-header.js 动态注入到这里 -->
<div id="header-placeholder"></div>
<main class="contact-main">
  <!-- 谷歌地图（放在最上方） -->
  <div class="map-wrapper">
<iframe width="100%" height="400" frameborder="0" scrolling="no" marginheight="0" marginwidth="0" src="https://www.openstreetmap.org/export/embed.html?bbox=118.828%2C32.205%2C118.848%2C32.225&layer=mapnik&marker=32.2145,118.8368"></iframe>
</div>
  <!-- 三项联系方式自动下移 -->
  <div class="contact-grid">

    <!-- 电话区块 -->
    <div class="contact-box">
      <div class="icon"><i class="fa-solid fa-phone"></i></div>
      <div class="details">
        <h4>Telephone</h4>
        <p>+86 131-8282-2839</p >
        <p style="color: #a0aec0; font-size: 18px; margin-top: 5px;">Mon-Sat 8:00 - 18:00</p >
      </div>
    </div>

    <!-- 邮箱区块 -->
    <div class="contact-box">
      <div class="icon"><i class="fa-solid fa-envelope"></i></div>
      <div class="details">
        <h4>E-mail</h4>
        <p>charleytian@gmail.com</p >
        <p style="color: #a0aec0; font-size: 18px; margin-top: 5px;">usually reply within 24 hours</p >
      </div>
    </div>

    <!-- 地址区块 -->
    <div class="contact-box">
      <div class="icon"><i class="fa-solid fa-location-dot"></i></div>
      <div class="details">
        <h4>Address</h4>
        <p>Room102 #1 building #66 Yangxin Rd, Liuhe District, Nanjing, Jiangsu Province, China</p >
      </div>
    </div>

  </div>
</main>
<!-- 页脚由 load-footer.js 动态注入到这里 -->
<div id="footer-placeholder"></div>

<script src="/load-header.js"></script>
<script src="/load-footer.js"></script>
</body>
</html>
<form id="contactForm" action="https://api.web3forms.com/submit" method="POST" enctype="multipart/form-data">
  <input type="hidden" name="access_key" value="f14fb69c-2d04-42d4-b6c3-d1ec82bd9d0e">
  <input type="hidden" name="subject" value="New Inquiry from TitanSportGear Website">

  <div class="form-group">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>
  </div>

  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>
  </div>

  <div class="form-group">
    <label for="country">Country</label>
    <input type="text" id="country" name="country">
  </div>

  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" required></textarea>
  </div>
<div class="form-group">
    <label for="attachment">Attach Image / File (optional)</label>
    <input type="file" id="attachment" name="attachment" accept="image/*,.pdf">
  </div>
  <button type="submit">Send Inquiry</button>
</form>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const data = new FormData(form);
  const btn = form.querySelector('button');
  btn.textContent = 'Sending...';
  btn.disabled = true;

  try {
    const res = await fetch(form.action, { method: 'POST', body: data });
    const result = await res.json();
    if (result.success) {
      alert('Message sent! We will get back to you soon.');
      form.reset();
    } else {
      alert('Something went wrong, please try again.');
    }
  } catch (err) {
    alert('Network error, please try again.');
  }
  btn.textContent = 'Send Inquiry';
  btn.disabled = false;
});
</script>
