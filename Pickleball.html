.basketball-gallery {
    max-width: 1200px;          /* 限制最大宽度，防止在大屏幕上图片太散 */
    margin: 0 auto;             /* 居中显示 */

}

/* 每一张图片的样式 */
.basketball-gallery img {
    width: 100%;                /* 宽度自动撑满网格 */
    height: 220px;              /* 固定高度，确保每张图大小完全一致 */

    box-shadow: 0 4px 10px rgba(0,0,0,0.5); /* 给图片加一点立体阴影 */
    transition: transform 0.3s; /* 鼠标放上去时加上平滑动画 */
}

/* 鼠标放到图片上时的微动特效 */

<!-- 1. 弹窗的 HTML 结构（用于显示放大图片和描述） -->
<!-- ========================================== -->
<div id="imageModal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <img id="modalImg" src="" alt="放大图片">
    <div id="modalDescription" class="modal-desc"></div>
  </div>
</div>

<!-- ========================================== -->
<!-- 2. JavaScript 核心逻辑脚本 -->
<!-- ========================================== -->
<script>
  // 打开弹窗的函数
  function openModal(imgElement) {
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("modalImg");
    const modalDesc = document.getElementById("modalDescription");

    modal.style.display = "flex"; // 显示弹窗
    modalImg.src = imgElement.src; // 让大图的路径等于当前点击的小图路径
    
    // 获取小图自带的 alt 属性文字（例如 "Pickleball set 1"）
    const productTitle = imgElement.alt;
    
    // 【自定义描述】您可以在下方自由修改这句产品介绍文字
    modalDesc.innerText = productTitle + " \n\n This is a professional pickleball set designed for advanced players. Made of T700 carbon fiber, it offers precise ball control and a comfortable grip. The set includes 2 high-quality paddles, 4 professional outdoor balls, and a portable carrying bag."; 
  }

  // 关闭弹窗的函数
  function closeModal() {
    document.getElementById("imageModal").style.display = "none";
  }
</script>
