<style type="text/css">
/* 让 basketball 页面的下拉菜单也有滚动条 */
.my-dropdown-menu {

    overflow-y: auto !important;    /* 开启垂直滚动条 */
}
/* 25张图片的外层大盒子 */
.basketball-container {
    background-color: #1a1a1a;  /* 保持门楣以下依然是高档的深黑色 */
    padding: 60px 20px;         /* 上下左右留出舒服的间距 */
}

.basketball-gallery {
    max-width: 1200px;          /* 限制最大宽度，防止在大屏幕上图片太散 */
    margin: 0 auto;             /* 居中显示 */
    display: grid;              /* 启用现代网格排版 */
    grid-template-columns: repeat(5, 1fr); /* 核心：每行精准排列 5 张图片 */
    gap: 20px;                  /* 图片与图片之间的间隙 */
}

/* 每一张图片的样式 */
.basketball-gallery img {
    width: 100%;                /* 宽度自动撑满网格 */
    height: 220px;              /* 固定高度，确保每张图大小完全一致 */

    transition: transform 0.3s; /* 鼠标放上去时加上平滑动画 */
}

/* 鼠标放到图片上时的微动特效 */

<!-- 1. 弹窗的 HTML 结构（用于显示放大图片和描述） -->
<!-- ========================================== -->
<div id="imageModal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <img id="modalImg" src="" alt="放大图片">
    <div id="modalDescription" class="modal-desc"></div>
  </div>
</div>

<!-- ========================================== -->
<!-- 2. JavaScript 核心逻辑脚本 -->
<!-- ========================================== -->
<script>
  // 打开弹窗的函数
  function openModal(imgElement) {
  const modal = document.getElementById("imageModal");
  const modalImg = document.getElementById("modalImg");
  const modalDesc = document.getElementById("modalDescription");

  modal.style.display = "flex";
  modalImg.src = imgElement.src;

  const productTitle = imgElement.alt;
  const productDesc = imgElement.dataset.desc || "暂无产品说明";

  modalDesc.innerText = productTitle + "\n\n" + productDesc;
}

  // 关闭弹窗的函数
  function closeModal() {
    document.getElementById("imageModal").style.display = "none";
  }
</script>
